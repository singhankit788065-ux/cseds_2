<!DOCTYPE html>
<html>
<head>
    <title>Student Result</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Student Result System (4 Subjects)</h2>
    DSAC    : <input type="number" id="sub1"><br><br>
    MATH  : <input type="number" id="sub2"><br><br>
    WEBD    : <input type="number" id="sub3"><br><br>
    DeTh    : <input type="number" id="sub4"><br><br>
    
    <button id="calcBtn">Calculate</button>

    <div id="result">
        <p>Total: <span id="total"></span></p>
        <p>Percentage: <span id="percentage"></span>%</p>
        <p>Result: <span id="grade"></span></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
