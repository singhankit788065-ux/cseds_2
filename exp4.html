<!DOCTYPE html>
<html>
<head>
    <title>Student Result Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
            padding: 40px;
        }
        .container {
            background: white;
            padding: 25px;
            width: 400px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }
        input {
            padding: 8px;
            width: 80%;
            margin-top: 5px;
            box-sizing: border-box;
        }
        button {
            padding: 10px 20px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
        }
        button:hover {
            background-color: darkblue;
        }
        #result {
            margin-top: 20px;
            font-weight: bold;
            font-size: 18px;
            line-height: 1.6; /* Spaces out the result lines nicely */
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Student Result Calculator</h2>
    <label for="subjects">Enter Number of Subjects</label><br>
    <input type="number" id="subjects" min="1" placeholder="e.g. 5"><br>
    <button onclick="calculateResult()">Calculate Result</button>
    <div id="result"></div>
</div>

<script>
    function calculateResult() {
        let n = parseInt(document.getElementById("subjects").value);
        
        // Validation: Ensure the user entered a valid number of subjects
        if (isNaN(n) || n <= 0) {
            alert("Please enter a valid number of subjects greater than 0.");
            return;
        }

        let total = 0;
        for (let i = 1; i <= n; i++) {
            let userInput = prompt("Enter marks for Subject " + i);
            let marks = parseFloat(userInput);
            
            // Validation: Ensure the user entered a valid number for marks
            if (isNaN(marks) || marks < 0) {
                alert("Invalid marks entered. Please try again.");
                return; // Stops execution if input is ruined
            }
            total = total + marks;
        }

        let average = total / n;
        let grade;
        let result;

        // Grade Logic
        if (average >= 90) {
            grade = "A+";
        } else if (average >= 75) {
            grade = "A";
        } else if (average >= 60) {
            grade = "B";
        } else if (average >= 50) {
            grade = "C";
        } else {
            grade = "F";
        }

        // Pass/Fail Logic
        if (average >= 40) {
            result = "<span style='color: green;'>PASS</span>";
        } else {
            result = "<span style='color: red;'>FAIL</span>";
        }

        // Display results
        document.getElementById("result").innerHTML =
            "Total Marks: " + total + "<br>" +
            "Average Marks: " + average.toFixed(2) + "<br>" +
            "Grade: " + grade + "<br>" +
            "Result: " + result;
    }
</script>

</body>
</html>
